<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oldagram</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="section_container header_container">
          <img
            class="logo"
            src="./img/logo.png"
            alt="logo of social media app"
          />
          <img
            class="profile_photo"
            src="./img/user-avatar.png"
            alt="profile photo"
          />
        </div>
      </header>
      <main>
        <section class="author_info_section section_container">
          <div class="author_info_container">
            <img
              class="profile_photo post_author_photo"
              src="./img/avatar-vangogh.jpg"
              alt="Post author profile photo"
            />
            <div class="post_author_info">
              <h1 class="post_author_name">Vincent van Gogh</h1>
              <p class="post_author_location">Zudert, Netherlands</p>
            </div>
          </div>
        </section>
        <section class="post_image_section section_container">
          <img
            class="post_image"
            src="./img/post-vangogh.jpg"
            alt="Post image"
          />
        </section>
        <section class="post_info_section section_container">
          <div class="icons_container">
            <img
              class="icons icon_like"
              src="./img/icon-heart.png"
              alt="like icon"
            />
            <img
              class="icons icon_comment"
              src="./img/icon-comment.png"
              alt="comment icon"
            />
            <img
              class="icons icon_dm"
              src="./img/icon-dm.png"
              alt="direct message icon"
            />
          </div>
          <p class="post_like_count highlight_text">21,492 likes</p>
          <p class="post_caption">
            <span class="username highlight_text">vincey1853</span>
            <span class="comment">just took a few mushrooms lol</span>
          </p>
        </section>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
